# SportsPlus league name → Flashscore results URL
# Run: python -m src.app.cli collect-leagues to scrape all mapped leagues

leagues:
  # North America
  NBA:
    flashscore: "https://www.flashscore.com/basketball/usa/nba/results/"
    source: nba_api  # use nba_api instead of flashscore
  NCAA:
    flashscore: "https://www.flashscore.com/basketball/usa/ncaa/results/"

  # Europe - Top Leagues
  Euroleague:
    flashscore: "https://www.flashscore.com/basketball/europe/euroleague/results/"
    aliases: ["EuroLeague"]
  ABA Liga:
    flashscore: "https://www.flashscore.com/basketball/europe/aba-league/results/"
    aliases: ["ABA League", "ABA Liga 2"]
  VTB United League:
    flashscore: "https://www.flashscore.com/basketball/russia/vtb-united-league/results/"
    aliases: ["VTB"]

  # Europe - National
  Spain ACB:
    flashscore: "https://www.flashscore.com/basketball/spain/acb/results/"
    aliases: ["Liga Endesa", "ACB"]
  Turkish Super Lig:
    flashscore: "https://www.flashscore.com/basketball/turkey/super-lig/results/"
    aliases: ["BSL", "Turkey Super Lig", "Turkish BSL"]
  French LNB:
    flashscore: "https://www.flashscore.com/basketball/france/lnb/results/"
